<!DOCTYPE html>
<html lang="gl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChiquenRun - Pro Edition</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            touch-action: none;
            font-family: 'Arial Black', sans-serif;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100vw !important;
            height: 100vh !important;
        }

        /* Marcador Adaptable */
        #timer-display {
            position: fixed; top: 5vh; left: 50%; transform: translateX(-50%);
            color: #8e44ad; font-size: 12vw; font-weight: bold;
            text-shadow: 2px 2px #000; display: none; z-index: 10;
        }
        
        #score-box {
            position: fixed; top: 2vh; left: 3vw;
            background: rgba(0,0,0,0.7); border: 2px solid #8e44ad;
            padding: 5px 10px; border-radius: 8px; color: #fff;
            display: none; z-index: 10;
        }
        #score { font-size: 6vw; font-weight: bold; color: #ffff00; }

        #lives-box {
            position: fixed; top: 2vh; right: 3vw;
            display: none; gap: 5px; z-index: 10;
        }
        .vida-icon { width: 8vw; height: auto; }

        #ui-bottom-f2 {
            position: fixed; bottom: 5vh; width: 100%;
            display: none; justify-content: space-around;
            color: #ffff00; font-size: 5vw; z-index: 10;
            text-shadow: 2px 2px #000;
        }

        .video-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000; display: none; z-index: 9999;
            object-fit: contain;
        }

        #selection {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: white; z-index: 100;
        }
        
        .option-container { display: flex; gap: 10vw; }
        .veh-column { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .veh-img-box {
            border: 4px solid #8e44ad; border-radius: 15px; 
            width: 35vw; height: 35vw; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: center; background: #222;
        }
        .veh-img-box img { width: 80%; }

        #loading-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; color: #8e44ad; display: flex;
            align-items: center; justify-content: center; z-index: 1000;
            font-size: 5vw;
        }
    </style>
</head>
<body>

    <div id="loading-screen">CARGANDO JUEGO...</div>

    <canvas id="gameCanvas"></canvas>

    <div id="timer-display">30</div>
    <div id="score-box">PUNTOS: <span id="score">0</span></div>
    <div id="lives-box"></div>

    <div id="ui-bottom-f2">
        <div>GAS: <span id="gasF2">100</span>%</div>
        <div>META: <span id="metaF2">100</span>%</div>
    </div>

    <div id="selection" style="display:none;">
        <h2 style="text-align:center; font-size: 7vw;">ESCOLLLE VEHÍCULO</h2>
        <div class="option-container">
            <div class="veh-column" onclick="startGame('moto')">
                <div class="veh-img-box"><img src="motero.png"></div>
                <div style="color:#ffff00; font-size:5vw;">MOTO</div>
            </div>
            <div class="veh-column" onclick="startGame('coche')">
                <div class="veh-img-box"><img src="coche.png"></div>
                <div style="color:#ffff00; font-size:5vw;">COCHE</div>
            </div>
        </div>
    </div>

    <video id="video-player" class="video-overlay" playsinline></video>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('video-player');
    
    let GW = window.innerWidth;
    let GH = window.innerHeight;
    canvas.width = GW; canvas.height = GH;

    // --- CARGA DE ACTIVOS ---
    const assets = {
        imgs: {},
        sounds: {}
    };

    const imgPaths = {
        muralla: 'muralla.png', motero: 'motero.png', coche: 'coche.png',
        pollo: 'pollo.png', guardia: 'guardia.png', pizza: 'pizza.png',
        vida: 'vida.png', fondoF2: 'fondoentero.png', moteroF2: 'motero_fase2.png'
    };

    let loadedCount = 0;
    const totalToLoad = Object.keys(imgPaths).length;

    // Precarga de imágenes para evitar lag
    Object.entries(imgPaths).forEach(([name, path]) => {
        const img = new Image();
        img.src = path;
        img.onload = () => {
            assets.imgs[name] = img;
            loadedCount++;
            if(loadedCount >= totalToLoad) {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('selection').style.display = 'flex';
            }
        };
    });

    // --- VARIABLES DE JUEGO ---
    let state = 'MENU';
    let score = 0, lives = 3, timeLeft = 30, gas = 100;
    let selectedVeh = 'moto';
    let bgY = 0;
    let obstacles = [];
    let lastTime = 0;
    let lane = 1;

    function startGame(veh) {
        selectedVeh = veh;
        state = 'PLAYING';
        document.getElementById('selection').style.display = 'none';
        document.getElementById('timer-display').style.display = 'block';
        document.getElementById('score-box').style.display = 'block';
        document.getElementById('lives-box').style.display = 'flex';
        updateLivesUI();
        requestAnimationFrame(gameLoop);
    }

    function updateLivesUI() {
        const box = document.getElementById('lives-box');
        box.innerHTML = '';
        for(let i=0; i<lives; i++) {
            box.innerHTML += `<img src="vida.png" class="vida-icon">`;
        }
    }

    function spawnObstacle() {
        if(state !== 'PLAYING') return;
        const l = Math.floor(Math.random() * 3);
        const types = ['guardia', 'pollo', 'pizza'];
        const type = types[Math.floor(Math.random() * types.length)];
        obstacles.push({
            x: (GW/3)*l + (GW/6) - 40,
            y: -100,
            w: 80, h: 80,
            type: type,
            speed: 5 + (Math.random() * 3)
        });
    }
    setInterval(spawnObstacle, 1000);

    // --- CONTROLES ---
    window.addEventListener('touchstart', (e) => {
        if(state === 'PLAYING') {
            if(e.touches[0].clientX < GW/2) { if(lane > 0) lane--; }
            else { if(lane < 2) lane++; }
        }
    });

    // --- LOOP PRINCIPAL ---
    function gameLoop(timestamp) {
        const dt = timestamp - lastTime;
        lastTime = timestamp;

        ctx.clearRect(0, 0, GW, GH);

        if(state === 'PLAYING') {
            // Fondo infinito
            bgY += 5;
            if(bgY >= GH) bgY = 0;
            ctx.drawImage(assets.imgs.muralla, 0, bgY - GH, GW, GH);
            ctx.drawImage(assets.imgs.muralla, 0, bgY, GW, GH);

            // Jugador
            const targetX = (GW/3)*lane + (GW/6) - 50;
            const pImg = selectedVeh === 'moto' ? assets.imgs.motero : assets.imgs.coche;
            ctx.drawImage(pImg, targetX, GH - 150, 100, 120);

            // Obstáculos
            obstacles.forEach((o, i) => {
                o.y += o.speed;
                ctx.drawImage(assets.imgs[o.type], o.x, o.y, o.w, o.h);

                // Colisión simple
                if(o.y > GH - 180 && o.y < GH - 50 && Math.abs(o.x - targetX) < 40) {
                    if(o.type === 'pollo') { score += 100; document.getElementById('score').innerText = score; }
                    else { lives--; updateLivesUI(); if(lives<=0) location.reload(); }
                    obstacles.splice(i, 1);
                }
            });

            // Timer
            timeLeft -= 0.016;
            document.getElementById('timer-display').innerText = Math.ceil(timeLeft);

            if(timeLeft <= 0) {
                state = 'VIDEO_CONCIERTO';
                playConcierto();
            }
        }
        
        if(state !== 'FINISHED') requestAnimationFrame(gameLoop);
    }

    function playConcierto() {
        document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:40vh;'>¡LLEGASTE AL CONCIERTO!</h1>";
        // Aquí puedes redirigir al vídeo final de YouTube o cargar el local
        video.src = "video_concierto.mp4";
        video.style.display = 'block';
        video.play().catch(e => console.log("Esperando click para video"));
    }

</script>
</body>
</html>
