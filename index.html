<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChiquenRun</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #000; font-family: 'Arial', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; width: 100vw;
        }
        
        canvas { 
            display: block; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #444;
            /* Forzamos que se vea lo mejor posible */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        /* Cartel para forzar modo vertical */
        #orientation-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white;
            z-index: 999; text-align: center;
            justify-content: center; align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        /* Si el móvil se pone de lado (horizontal), mostramos el aviso */
        @media (orientation: landscape) {
            #orientation-warning { display: flex; }
            #gameCanvas { display: none; }
            #overlay { display: none; }
        }

        #overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); color: white;
            display: flex; justify-content: center; align-items: center;
            z-index: 100; cursor: pointer; text-align: center;
            flex-direction: column;
        }

        .btn-start {
            background: #ffcc00; color: #000;
            padding: 15px 30px; border-radius: 30px;
            font-weight: bold; font-size: 1.5rem; margin-top: 20px;
            border: none; animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="orientation-warning">
        <h1 style="font-size: 3rem;">🔄</h1>
        <h2>MODO VERTICAL NECESARIO</h2>
        <p>Por favor, gira tu dispositivo para poder jugar.</p>
    </div>

    <div id="overlay">
        <h1 style="font-size: 2.5rem; color: #ffcc00;">CHIQUEN RUN</h1>
        <p>Esquiva los coches y sobrevive</p>
        <div class="btn-start">¡TOCA PARA JUGAR!</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');

        // AJUSTES DE RENDIMIENTO
        // Usamos una resolución interna fija para que no dependa de la potencia del móvil
        const GAME_WIDTH = 480;
        const GAME_HEIGHT = 854;

        function resize() {
            const scale = Math.min(window.innerWidth / GAME_WIDTH, window.innerHeight / GAME_HEIGHT);
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
            canvas.style.width = (GAME_WIDTH * scale) + 'px';
            canvas.style.height = (GAME_HEIGHT * scale) + 'px';
        }

        window.addEventListener('resize', resize);
        resize();

        // VARIABLES DEL JUEGO
        let gameRunning = false;
        let lastTime = 0;

        // CARGA DE IMÁGENES (Asegúrate que los nombres coinciden en tu GitHub)
        const sprites = {
            pollo: new Image(),
            fondo: new Image(),
            coche: new Image()
        };
        sprites.pollo.src = 'pollo.png';
        sprites.fondo.src = 'fondoentero.png';
        sprites.coche.src = 'coche.png';

        // CARGA DE SONIDO (Sin tildes para evitar errores)
        const musicaFondo = new Audio('musica_fondo.mp3');
        musicaFondo.loop = true;

        // INICIO DEL JUEGO
        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
            gameRunning = true;
            musicaFondo.play().catch(e => console.log("Audio bloqueado"));
            requestAnimationFrame(mainLoop);
        });

        // BUCLE PRINCIPAL (A 60 FPS)
        function mainLoop(timestamp) {
            if (!gameRunning) return;

            // DeltaTime ayuda a que el juego vaya a la misma velocidad en cualquier móvil
            const dt = timestamp - lastTime;
            lastTime = timestamp;

            actualizar(dt);
            dibujar();

            requestAnimationFrame(mainLoop);
        }

        function actualizar(dt) {
            // AQUÍ PEGAS TU LÓGICA: movimiento de coches, colisiones, etc.
            // Ejemplo: coche.x -= velocidad * (dt / 16);
        }

        function dibujar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar fondo
            if (sprites.fondo.complete) {
                ctx.drawImage(sprites.fondo, 0, 0, canvas.width, canvas.height);
            }

            // Dibujar pollo (ejemplo posición central)
            if (sprites.pollo.complete) {
                ctx.drawImage(sprites.pollo, canvas.width/2 - 25, canvas.height - 100, 50, 50);
            }
        }
    </script>
</body>
</html>
