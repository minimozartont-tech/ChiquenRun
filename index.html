<!DOCTYPE html>
<html lang="gl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Festival Run - Versión Final</title>
    <style>
        /* TU CSS ORIGINAL SIN CAMBIOS */
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; image-rendering: pixelated; position: fixed; top: 0; left: 0; width: 100% !important; height: 100% !important; }
        #timer-display { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #8e44ad; font-size: 10vw; font-weight: bold; text-shadow: 3px 3px #000; display: none; z-index: 10; white-space: nowrap; }
        #score-box { position: fixed; bottom: 60px; left: 15px; background: rgba(0,0,0,0.85); border: 2px solid #8e44ad; padding: 6px 12px; border-radius: 10px; color: #fff; min-width: 90px; display: none; z-index: 10; }
        #score-box span { color: #8e44ad; font-size: 11px; text-transform: uppercase; display: block; }
        #score { font-size: 22px; font-weight: bold; }
        #lives-box { position: fixed; bottom: 60px; right: 15px; background: rgba(0,0,0,0.85); border: 2px solid #8e44ad; padding: 6px; border-radius: 10px; display: none; flex-direction: row; gap: 6px; z-index: 10; }
        .vida-slot { width: 36px; height: 36px; background: rgba(142,68,173,0.1); border: 1px solid #8e44ad; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .vida-icon { width: 30px; height: auto; }
        #meta-container { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); display: none; font-weight: bold; font-size: 6vw; z-index: 20; text-shadow: 2px 2px #000; white-space: nowrap; }
        #ui-bottom-f2 { position: fixed; bottom: 60px; width: 100%; display: none; justify-content: space-around; color: #ffff00; font-size: 5vw; z-index: 10; pointer-events: none; padding: 0 10px; }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; z-index: 9999; object-fit: cover; }
        #selection { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 20; }
        .veh-column { display: flex; flex-direction: column; align-items: center; gap: 15px; cursor: pointer; }
        .veh-img-box { border: 3px solid #8e44ad; border-radius: 20px; background: #111; width: 28vw; height: 45vw; display: flex; align-items: center; justify-content: center; }
        .veh-img-box img { width: 80%; }
        .veh-btn { border: 2px solid #ffff00; padding: 10px 0; border-radius: 10px; font-weight: bold; color: #ffff00; width: 28vw; text-align: center; background: rgba(255,255,0,0.1); font-size: 4vw; }
        
        /* BOTÓN DE DESBLOQUEO PARA GITHUB */
        #btn-unlock { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #000; color: #8e44ad; z-index: 5000; 
            display: flex; align-items: center; justify-content: center;
            font-size: 8vw; font-weight: bold; border: none;
        }
    </style>
</head>
<body>
    <button id="btn-unlock">CLICA PARA XOGAR</button>

    <canvas id="gameCanvas"></canvas>
    <div id="selection">
        <h2>Escolle o teu vehículo<br>para chegar ao Sin City</h2>
        <div class="option-container">
            <div class="veh-column" onclick="mostrarTutorial1('moto')">
                <div class="veh-img-box"><img src="motero.png"></div>
                <div class="veh-btn">MOTO</div>
            </div>
            <div class="veh-column" onclick="mostrarTutorial1('coche')">
                <div class="veh-img-box"><img src="coche.png"></div>
                <div class="veh-btn">COCHE</div>
            </div>
        </div>
    </div>

    <div id="timer-display">30</div>
    <div id="score-box"><span>PUNTOS</span><div id="score">0</div></div>
    <div id="lives-box">
        <div class="vida-slot" id="slot-1"></div>
        <div class="vida-slot" id="slot-2"></div>
        <div class="vida-slot" id="slot-3"></div>
    </div>
    <video id="final-video" class="video-overlay" playsinline></video>

</body>
</html>
