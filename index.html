<!DOCTYPE html> <html lang="gl">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Festival Run - Versión Final</title>  
    <style>  
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }  
        canvas { display: block; image-rendering: pixelated; margin: 0 auto; }  
        #timer-display { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); color: #8e44ad; font-size: 60px; font-weight: bold; text-shadow: 3px 3px #000; display: none; z-index: 10; }  
        #score-box { position: absolute; bottom: 20px; left: 20px; background: rgba(0, 0, 0, 0.8); border: 2px solid #8e44ad; padding: 8px 15px; border-radius: 10px; color: #fff; min-width: 80px; display: none; z-index: 10; }  
        #score-box span { color: #8e44ad; font-size: 12px; text-transform: uppercase; }  
        #score { font-size: 20px; font-weight: bold; }  
        #lives-box { position: absolute; bottom: 20px; right: 20px; background: rgba(0, 0, 0, 0.8); border: 2px solid #8e44ad; padding: 8px; border-radius: 10px; display: none; flex-direction: row; gap: 8px; z-index: 10; }  
        .vida-slot { width: 40px; height: 40px; background: rgba(142, 68, 173, 0.1); border: 1px solid #8e44ad; border-radius: 6px; display: flex; align-items: center; justify-content: center; }  
        .vida-icon { width: 34px; height: auto; }  
        #meta-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: none; font-weight: bold; font-size: 28px; z-index: 20; text-shadow: 2px 2px #000; }  
        #meta-label { color: #00ff00; margin-right: 10px; }  
        #meta-value { color: #ffffff; }  
        #ui-bottom-f2 { position: absolute; bottom: 5%; width: 100%; display: none; justify-content: space-around; color: #ffff00; font-size: 18px; z-index: 10; pointer-events: none; }  
        
        /* Solución para el icono de Play */
        .video-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #000; display: none; z-index: 9999; object-fit: cover;
            opacity: 0; transition: opacity 0.3s;
        }
        .video-active { display: block !important; opacity: 1; }

        #fase2-video { 
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
            height: auto; max-height: 56.25vw; object-fit: contain; 
        }

        #screen-concierto { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 110; text-align: center; cursor: pointer; }  
        #screen-concierto h1 { font-size: 26px; color: #00ff00; text-transform: uppercase; margin: 0; }  
        #screen-concierto p { font-size: 18px; color: #ffffff; text-transform: uppercase; margin-top: 15px; }  
        #selection { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 20; }  
        #selection h2 { color: #8e44ad; text-shadow: 2px 2px #000; font-size: 32px; margin-bottom: 40px; text-align: center; }  
        .option-container { display: flex; gap: 30px; }  
        .veh-column { display: flex; flex-direction: column; align-items: center; gap: 20px; cursor: pointer; }  
        .veh-img-box { border: 3px solid #8e44ad; border-radius: 20px; background: #111; width: 150px; height: 250px; display: flex; align-items: center; justify-content: center; }  
        .veh-img-box img { width: 80%; }  
        .veh-btn { border: 2px solid #ffff00; padding: 12px 0; border-radius: 10px; font-weight: bold; color: #ffff00; width: 150px; text-align: center; background: rgba(255,255,0,0.1); }  
        .tutorial-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: contain; background-position: center; background-repeat: no-repeat; background-color: black; z-index: 150; display: none; cursor: pointer; }  
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff0000; font-size: 50px; font-weight: bold; display: none; text-shadow: 4px 4px #000; text-align: center; z-index: 600; }  
    </style>
</head>  
<body>  
    <div id="tut1" class="tutorial-overlay" onclick="iniciarJuegoFase1()"></div>  
    <div id="tut2" class="tutorial-overlay" style="background-image: url('tutorial_fase2.png');" onclick="iniciarJuegoFase2()"></div>  
    <div id="screen-concierto" onclick="mostrarTutorial2()">  
        <h1>🎸 TOCA AQUÍ 🎸</h1>  
        <p>PARA CHEGAR AO CONCERTO</p>  
    </div>  
    
    <video id="final-video" class="video-overlay" playsinline muted autoplay preload="auto"></video>  
    <video id="fase2-video" class="video-overlay" playsinline muted autoplay preload="auto" src="video_concierto.mp4"></video>  

    <div id="timer-display">30</div>  
    <div id="score-box"><span>PUNTOS</span><div id="score">0</div></div>  
    <div id="lives-box"><div class="vida-slot" id="slot-1"></div><div class="vida-slot" id="slot-2"></div><div class="vida-slot" id="slot-3"></div></div>  
    <div id="meta-container"><span id="meta-label">META</span><span id="meta-value">100%</span></div>  
    <div id="ui-bottom-f2"><div>PUNTOS: <span id="scoreF2">0</span></div><div>GAS: <span id="gasF2">100</span>%</div></div>  

    <div id="selection">  
        <h2>Escolle o teu vehículo <br>para chegar ao Sin City </h2>  
        <div class="option-container">  
            <div class="veh-column" onclick="mostrarTutorial1('moto')">   
                <div class="veh-img-box"><img src="motero.png"></div>  
                <div class="veh-btn">MOTO</div>  
            </div>  
            <div class="veh-column" onclick="mostrarTutorial1('coche')">  
                <div class="veh-img-box"><img src="coche.png"></div>  
                <div class="veh-btn">COCHE</div>  
            </div>  
        </div>  
    </div>  

    <div id="msg">XOGO REMATADO</div>  
    <canvas id="gameCanvas"></canvas>  

<script>  
    const canvas = document.getElementById('gameCanvas');  
    const ctx = canvas.getContext('2d');  
    const finalVideo = document.getElementById('final-video');  
    const fase2Video = document.getElementById('fase2-video');  
      
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }  
    window.addEventListener('resize', resize);  
    resize();  

    const audio = {  
        bg1: new Audio('musica_juego.mp3'), bg2: new Audio('musica_fondo.mp3'),  
        crash: new Audio('choque.mp3'), point: new Audio('sonido_pollo.mp3'),  
        bueno: new Audio('sonido_bueno.mp3'), malo: new Audio('sonido_malo.wav')  
    };  
    audio.bg1.loop = true; audio.bg2.loop = true;

    const sources = {  
        intro: 'intro.png', motero: 'motero.png', coche: 'coche.png', pollo: 'pollo.png',  
        guardia: 'guardia.png', pizza: 'pizza.png', escenario: 'escenario.png',   
        muralla: 'muralla.png', vida: 'vida.png', puente: 'puente.png',  
        fondoF2: 'fondoentero.png', comidaF2: 'comida.png',   
        buenoF2: 'bueno.png', malo1F2: 'malo1.png',   
        malo2F2: 'malo2.png', venenoF2: 'veneno.png', moteroF2: 'motero_fase2.png'  
    };  

    const imgs = {};
    let lives = 3, timeLeft = 30, score = 0, gas = 100, selectedVeh = 'moto';  
    let state = 'START', obs = [], itemsF2 = [], mY = 0, bridgeMode = false;  
    let lastTimeUpdate = 0, framesF2 = 0, videoIniciado = false, bridgeTimer = 0; 
    const p = { lane: 1, x: canvas.width/2, y: 0, w: 85, h: 110, vy: 0, jumps: 0 };  
    const alturasF2 = [20, 165, 315];  

    for (let k in sources) { imgs[k] = new Image(); imgs[k].src = sources[k]; }  

    function updateUI() {  
        if (state === 'PLAYING' || state === 'ENDING') {  
            document.getElementById('timer-display').innerText = Math.max(0, Math.ceil(timeLeft));  
            document.getElementById('score').innerText = score;  
        }  
        if (state === 'FASE2') {  
            document.getElementById('scoreF2').innerText = score;  
            document.getElementById('gasF2').innerText = Math.floor(gas);  
            let metaRestante = Math.max(0, Math.floor(100 - (framesF2 / 6000 * 100)));  
            document.getElementById('meta-value').innerText = metaRestante + "%";  
        }  
        for(let i=1; i<=3; i++) {  
            const slot = document.getElementById('slot-' + i);  
            if(slot) slot.innerHTML = (i <= lives) ? `<img src="vida.png" class="vida-icon">` : '';  
        }  
    }  

    // Función de reinicio maestro
    function restartGame() {
        window.location.replace(window.location.href.split('#')[0].split('?')[0]);
    }

    window.mostrarTutorial1 = function(type) {  
        selectedVeh = type;  
        finalVideo.src = (selectedVeh === 'moto') ? 'moto_final.mp4' : 'coche_final.mp4';  
        finalVideo.load();  
        document.getElementById('selection').style.display = 'none';  
        const t1 = document.getElementById('tut1');  
        t1.style.backgroundImage = `url('tutorial_fase1_${type}.png')`;  
        t1.style.display = 'block';   
        state = 'TUTORIAL1';  
    }  

    window.iniciarJuegoFase1 = function() {  
        document.getElementById('tut1').style.display = 'none';  
        p.w = (selectedVeh === 'moto') ? 110 : 85;  
        p.y = canvas.height - 180;  
        state = 'PLAYING'; audio.bg1.volume = 0.5; audio.bg1.play();  
        document.getElementById('timer-display').style.display = 'block';  
        document.getElementById('score-box').style.display = 'block';  
        document.getElementById('lives-box').style.display = 'flex';  
        lastTimeUpdate = Date.now();  
    }  

    function playVideoDirect(vid) {
        vid.style.display = 'block';
        vid.play();
        vid.onplaying = () => { vid.classList.add('video-active'); };
    }

    function playFinalVideo() {  
        playVideoDirect(finalVideo);
        finalVideo.onended = () => {   
            audio.bg1.pause();  
            finalVideo.classList.remove('video-active');
            finalVideo.style.display = 'none';  
            document.getElementById('timer-display').style.display = 'none';  
            document.getElementById('score-box').style.display = 'none';  
            document.getElementById('lives-box').style.display = 'none';  
            document.getElementById('screen-concierto').style.display = 'flex';  
        };  
    }  

    window.mostrarTutorial2 = function() {  
        document.getElementById('screen-concierto').style.display = 'none';  
        document.getElementById('tut2').style.display = 'block'; state = 'TUTORIAL2';  
    }  

    window.iniciarJuegoFase2 = function() {  
        document.getElementById('tut2').style.display = 'none';  
        document.getElementById('ui-bottom-f2').style.display = 'flex';  
        document.getElementById('meta-container').style.display = 'block';  
        gas = 100; framesF2 = 0; itemsF2 = []; p.x = 80; p.y = canvas.height * 0.7; p.jumps = 0; videoIniciado = false;
        inicializarObjetosF2(); audio.bg2.play(); state = 'FASE2';  
    }  

    function inicializarObjetosF2() {  
        const total = 85; const intervalo = (100 * 60 * 0.92) / total;  
        for (let i = 0; i < total; i++) {  
            let tipo, img, w, h, fTarget = (i + 1) * intervalo;  
            if (i === 45) { tipo='comida'; img=imgs.comidaF2; w=85; h=85; }  
            else if (i === total - 2) { tipo='veneno'; img=imgs.venenoF2; w=80; h=80; }  
            else {  
                let r = Math.random();  
                if (r < 0.25) { tipo='pollo'; img=imgs.pollo; w=90; h=90; }  
                else if (r < 0.50) { tipo='bueno'; img=imgs.buenoF2; w=100; h=70; }  
                else if (r < 0.75) { tipo='malo'; img=imgs.malo1F2; w=70; h=70; }  
                else { tipo='malo'; img=imgs.malo2F2; w=50; h=40; }  
            }  
            itemsF2.push({ fTarget, x: canvas.width + 200, yB: alturasF2[Math.floor(Math.random()*3)], w, h, tipo, img, rec: false });  
        }  
    }  

    window.addEventListener('touchstart', (e) => {  
        if (state === 'START') { state = 'SELECTING'; document.getElementById('selection').style.display = 'flex'; return; }  
        if (state === 'PLAYING' && !bridgeMode) {  
            if (e.touches[0].clientX < canvas.width / 2) { if (p.lane > 0) p.lane--; }  
            else { if (p.lane < 2) p.lane++; }  
        }  
        if (state === 'FASE2') { if (p.jumps < 3) { p.vy = -12; p.jumps++; } }  
    });  

    function spawn() {  
        if (state !== 'PLAYING' || bridgeMode) return;  
        const l = Math.floor(Math.random() * 3); const r = Math.random();  
        let t = 'guardia', s = 6, w = 110, h = 120;  
        if (r < 0.4) { t = 'pollo'; s = 5.5; w = 80; h = 80; }   
        else if (r < 0.7) { t = 'pizza'; s = 7.5; w = 90; h = 90; }  
        obs.push({ x: (canvas.width/3)*l + (canvas.width/6)-w/2, y: -150, w, h, type: t, speed: s, vx: 0, isHit: false });  
    }  
    setInterval(spawn, 900);  

    // Reinicio corregido al terminar el concierto
    fase2Video.onended = () => { restartGame(); };

    function draw() {  
        if (state === 'GAMEOVER') {  
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);  
            document.getElementById('msg').style.display = 'block'; 
            return;  
        }  
        ctx.clearRect(0, 0, canvas.width, canvas.height);  
        
        if (state === 'START' || state === 'SELECTING' || state === 'TUTORIAL1') {  
            if (imgs.intro && imgs.intro.complete) ctx.drawImage(imgs.intro, 0, 0, canvas.width, canvas.height);  
        }   
        else if (state === 'PLAYING' || state === 'ENDING') {  
            let currentSpeed = bridgeMode ? 4.5 : 8.75; 
            if (state === 'PLAYING') {  
                let now = Date.now(); timeLeft -= (now - lastTimeUpdate) / 1000; lastTimeUpdate = now;  
                if (timeLeft <= 0 && !bridgeMode) { timeLeft = 0; bridgeMode = true; p.lane = 1; bridgeTimer = 100; } 
                mY = (mY + currentSpeed) % canvas.height; updateUI();  
            }  
            const bg = bridgeMode ? imgs.puente : imgs.muralla;  
            if(bg && bg.complete) { ctx.drawImage(bg, 0, mY - canvas.height, canvas.width, canvas.height); ctx.drawImage(bg, 0, mY, canvas.width, canvas.height); }  
            let targetX = (canvas.width/3)*p.lane + (canvas.width/6)-p.w/2; p.x += (targetX - p.x) * 0.2;  
            if (bridgeMode && state === 'PLAYING') { bridgeTimer--; if (bridgeTimer <= 0) state = 'ENDING'; }  
            if (state === 'ENDING') { p.y -= 8; if (p.y + p.h < 0) { state = 'VIDEO'; playFinalVideo(); } }  
            for (let i = obs.length - 1; i >= 0; i--) {  
                let o = obs[i]; o.y += (bridgeMode ? o.speed * 0.5 : o.speed); o.x += o.vx;  
                if (state === 'PLAYING' && !o.isHit && p.x < o.x+o.w-25 && p.x+p.w > o.x+25 && p.y < o.y+o.h-25 && p.y+p.h > o.y+25) {  
                    if (o.type === 'pollo') { score += 100; audio.point.play(); obs.splice(i,1); }   
                    else { lives--; updateUI(); audio.crash.play(); if(lives <= 0) { state='GAMEOVER'; setTimeout(restartGame, 2500); } else { o.isHit=true; o.vx = (p.lane===0)?15:-15; } }  
                }  
                const oImg = imgs[o.type]; if(oImg) ctx.drawImage(oImg, o.x, o.y, o.w, o.h);  
            }  
            const pImg = (selectedVeh === 'coche' ? imgs.coche : imgs.motero); if(pImg) ctx.drawImage(pImg, p.x, p.y, p.w, p.h);  
        }  
        else if (state === 'FASE2') {  
            let prog = framesF2 / 6000; if (prog < 1) framesF2++; else prog = 1;  
            const altJ = canvas.height * 0.45; const margS = (canvas.height - altJ) / 2;  
            if(imgs.fondoF2.complete) {  
                let ratio = imgs.fondoF2.width / imgs.fondoF2.height;  
                let aF = altJ * ratio; ctx.drawImage(imgs.fondoF2, -(prog * (aF - canvas.width)), margS, aF, altJ);  
            }  
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, margS); ctx.fillRect(0, margS + altJ, canvas.width, canvas.height);  
            itemsF2.forEach(it => {  
                if(!it.rec && framesF2 >= it.fTarget - 180) {  
                    it.x -= (canvas.width / 160);   
                    let yPos = (margS + altJ) - it.h - it.yB;  
                    if(it.img && it.img.complete) ctx.drawImage(it.img, it.x, yPos, it.w, it.h);  
                    if(p.x < it.x+it.w-20 && p.x+105 > it.x+20 && p.y < yPos+it.h-20 && p.y+165 > yPos+20) {  
                        it.rec = true; if(it.tipo==='pollo'){ score+=100; audio.point.play(); } if(it.tipo==='bueno'){ gas=Math.min(100, gas+15); audio.bueno.play(); } if(it.tipo==='malo'){ gas-=10; audio.malo.play(); } if(it.tipo==='veneno'){ gas = 0; audio.malo.play(); } if(it.tipo==='comida'){ score+=500; audio.point.play(); } updateUI();  
                    }  
                }  
            });  
            let sueloY = (margS + altJ) - 165 - 15; p.vy += 0.55; p.y += p.vy;   
            if(p.y > sueloY){ p.y = sueloY; p.vy = 0; p.jumps = 0; }   
            
            if(gas <= 0) { 
                state = 'GAMEOVER'; audio.bg2.pause();
                document.getElementById('msg').style.display = 'block';
                setTimeout(restartGame, 2500);
            }  

            if(imgs.moteroF2.complete) ctx.drawImage(imgs.moteroF2, p.x, p.y, 105, 165);  
            updateUI();  
            if(prog >= 1 && !videoIniciado) {  
                videoIniciado = true; canvas.style.display = 'none';
                document.getElementById('ui-bottom-f2').style.display = 'none';
                document.getElementById('meta-container').style.display = 'none';
                playVideoDirect(fase2Video);
            }  
        }  
        requestAnimationFrame(draw);  
    }  
    draw();  
</script>  
</body>  
</html>
